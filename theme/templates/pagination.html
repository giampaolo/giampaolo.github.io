{% if articles_page and articles_paginator.num_pages > 1 %}
<nav class="paginator">
    {% if articles_page.has_previous() %}
        <a href="{{ SITEURL }}/{{ articles_paginator.page(1).url }}" title="First page">&laquo;</a>
        <a href="{{ SITEURL }}/{{ articles_previous_page.url }}" title="Previous page">&lsaquo;</a>
    {% endif %}
    <span class="paginator-info">Page {{ articles_page.number }} of {{ articles_paginator.num_pages }}</span>
    {% if articles_page.has_next() %}
        <a href="{{ SITEURL }}/{{ articles_next_page.url }}" title="Next page">&rsaquo;</a>
        <a href="{{ SITEURL }}/{{ articles_paginator.page(articles_paginator.num_pages).url }}" title="Last page">&raquo;</a>
    {% endif %}
</nav>
{% endif %}
